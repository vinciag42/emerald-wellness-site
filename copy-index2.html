// Countdown timer — 30 days from page load
const launch = new Date(Date.now() + 30*24*60*60*1000);
function tick(){
  const diff = launch - Date.now();
  if(diff &lt;= 0) return;
  const d = Math.floor(diff/864e5);
  const h = Math.floor((diff%864e5)/36e5);
  const m = Math.floor((diff%36e5)/6e4);
  const s = Math.floor((diff%6e4)/1e3);
  document.getElementById('days').textContent  = String(d).padStart(2,'0');
  document.getElementById('hours').textContent = String(h).padStart(2,'0');
  document.getElementById('mins').textContent  = String(m).padStart(2,'0');
  document.getElementById('secs').textContent  = String(s).padStart(2,'0');
}
tick(); setInterval(tick,1000);

// Klaviyo + Supabase waitlist
const SUPABASE_URL  = 'https://mczpuffmlspmghgneukz.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jenB1ZmZtbHNwbWdoZ25ldWt6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNjczODAsImV4cCI6MjA5NTc0MzM4MH0.hs0CQOyrcIk5WhRr9OUU1fVs7V1sMcea7RYwWuTAVag';
const KLAVIYO_KEY   = 'WtKVHz';
const KLAVIYO_LIST  = 'XEEg3P';

async function joinWaitlist(){
  const emailEl = document.getElementById('waitlistEmail');
  const btn = document.getElementById('joinBtn');
  const email = emailEl.value.trim();
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    emailEl.style.borderColor='#e05c5c';
    setTimeout(()=&gt;emailEl.style.borderColor='',2000);
    return;
  }
  btn.disabled=true; btn.textContent='Joining...';

  // Save to Supabase
  try {
    const sbRes = await fetch(SUPABASE_URL+'/rest/v1/waitlist',{
      method:'POST',
      headers:{'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({email:email,source:'coming_soon',created_at:new Date().toISOString()})
    });
    console.log('Supabase status:', sbRes.status);
  } catch(e){ console.warn('Supabase:',e); }

  // Save to Klaviyo using client-side identify (works with public key)
  try {
    const kPayload = {
      token: KLAVIYO_KEY,
      properties: {
        '$email': email,
        '$source': 'Emerald Wellness Waitlist'
      }
    };
    const encoded = btoa(JSON.stringify(kPayload));
    await fetch('https://a.klaviyo.com/api/identify?data='+encoded);
    // Also subscribe to list
    await fetch('https://a.klaviyo.com/api/v2/list/'+KLAVIYO_LIST+'/members',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({api_key:KLAVIYO_KEY,profiles:[{email:email}]})
    });
    console.log('Klaviyo: profile added');
  } catch(e){ console.warn('Klaviyo:',e); }

  // Show success
  btn.textContent='✓ You're on the list!';
  document.getElementById('successBox').style.display='block';
  emailEl.value='';
  setTimeout(()=&gt;{ btn.disabled=false; btn.textContent='Join the Waitlist →'; },4000);
}
