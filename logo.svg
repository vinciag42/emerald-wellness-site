<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" width="320" height="360">
  <defs>
    <linearGradient id="gemMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7a0"/>
      <stop offset="45%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="gemTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bbf7d0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="gemLeft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#166534" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="gemRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer gem glow -->
  <polygon points="160,18 248,68 248,168 160,218 72,168 72,68"
           fill="#22c55e" opacity="0.12" filter="url(#glow)"/>

  <!-- Main gem body -->
  <polygon points="160,22 244,70 244,166 160,214 76,166 76,70"
           fill="url(#gemMain)"/>

  <!-- Top facet (lighter) -->
  <polygon points="160,22 244,70 160,118 76,70"
           fill="url(#gemTop)"/>

  <!-- Left facet (darker) -->
  <polygon points="76,70 160,118 160,214 76,166"
           fill="url(#gemLeft)"/>

  <!-- Right facet (darkest) -->
  <polygon points="244,70 160,118 160,214 244,166"
           fill="url(#gemRight)"/>

  <!-- Inner gem outline -->
  <polygon points="160,48 224,84 224,152 160,188 96,152 96,84"
           fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>

  <!-- Facet lines -->
  <line x1="160" y1="22"  x2="160" y2="214" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
  <line x1="76"  y1="70"  x2="244" y2="166" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <line x1="244" y1="70"  x2="76"  y2="166" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <line x1="160" y1="22"  x2="76"  y2="70"  stroke="rgba(255,255,255,0.10)" stroke-width="0.8"/>
  <line x1="160" y1="22"  x2="244" y2="70"  stroke="rgba(255,255,255,0.10)" stroke-width="0.8"/>

  <!-- EW monogram -->
  <text x="160" y="131" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="46" font-weight="700" letter-spacing="-1"
        fill="rgba(6,14,8,0.75)">EW</text>

  <!-- Decorative rule -->
  <line x1="60" y1="246" x2="260" y2="246" stroke="#22c55e" stroke-width="0.6" opacity="0.5"/>
  <circle cx="160" cy="246" r="3" fill="#4ade80" opacity="0.8"/>
  <circle cx="80"  cy="246" r="1.5" fill="#22c55e" opacity="0.4"/>
  <circle cx="240" cy="246" r="1.5" fill="#22c55e" opacity="0.4"/>

  <!-- EMERALD text -->
  <text x="160" y="278" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="24" font-weight="700" letter-spacing="8"
        fill="#4ade80">EMERALD</text>

  <!-- WELLNESS text -->
  <text x="160" y="306" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13.5" font-weight="400" letter-spacing="9"
        fill="#7a9880">WELLNESS</text>

  <!-- Tagline -->
  <text x="160" y="332" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="8.8" font-style="italic" letter-spacing="1.8"
        fill="#111111">Where Transformation Begins</text>
</svg>
